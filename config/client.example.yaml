# Example config for the non-interactive DASH client runner.
# Copy this file to config/client.local.yaml and set mpd_url before running.

mpd_url: ""

media_engine:
  name: "fake"
  # GStreamer integration/demo mode can use name: "gst" on Ubuntu.
  # Headless GST validation normally uses decode_video: false and sink_name: null,
  # which selects fakesink. Optional visible playback uses decode_video: true
  # with sink_name such as "autovideosink" on a machine with a display server.
  min_queue_time: 1.0
  decode_video: false
  sink_name: null

controller:
  name: "fixed_quality"
  params:
    level: 0

playback:
  initial_quality: 0
  initial_controller_decision: false
  headless: true
  max_buffer_seconds: 60.0
  drain_buffer_sleep_seconds: 0.5
  preroll_seconds: 10.0

downloader:
  max_retries: 3
  verbose: false

output:
  root_dir: "logs"
  segment_telemetry_filename: "segment_telemetry.csv"
  evaluation_segments_filename: "evaluation_segments.csv"

logging:
  enabled: true
  level: "INFO"

analysis:
  enabled: false
  output_root: "analysis_output"
